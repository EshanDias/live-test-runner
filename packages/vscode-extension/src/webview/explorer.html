<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{stylesUri}}">
  <title>Live Test Runner</title>
</head>
<body>
<div class="explorer-layout">

  <!-- Coverage gauge (Phase 1: placeholder) -->
  <div class="coverage-section">
    <div class="coverage-label">
      <span>Code Coverage</span>
      <span class="coming-soon" title="Coming in a future release">coming soon</span>
    </div>
    <div class="coverage-bar-track">
      <div class="coverage-bar-fill" id="coverageFill"></div>
    </div>
    <div class="coverage-explore-btn" title="Code coverage explorer — coming soon">
      Explore Coverage ›
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar" id="actionBar">
    <!-- idle state -->
    <button class="action-btn primary" id="btnStart" title="Discover and run all tests (Ctrl+Shift+T)">▶ Start Testing</button>
    <!-- watching state -->
    <button class="action-btn secondary hidden" id="btnRerun" title="Stop current session and do a fresh run">↺ Rerun Tests</button>
    <button class="action-btn ghost hidden" id="btnStop" title="Stop the test session">⏹ Stop</button>
    <!-- running state — shown instead of start/rerun -->
    <button class="action-btn ghost hidden" id="btnStopRun" title="Stop the current run">⏹ Stop Testing</button>
    <!-- watching indicator -->
    <span class="watch-indicator hidden" id="watchIndicator" title="Live Test Runner is active — tests will re-run automatically when you save a file">
      <span class="watch-dot"></span>live
    </span>
  </div>

  <!-- Run progress (shown only during a run) -->
  <div class="run-progress" id="runProgress">Running — 0 / 0 files complete</div>

  <!-- Summary table -->
  <div class="summary-section">
    <div class="summary-table">
      <div class="summary-cell total">
        <div class="label">Total</div>
        <div class="value" id="summaryTotal">—</div>
      </div>
      <div class="summary-cell passed">
        <div class="label">Passed</div>
        <div class="value" id="summaryPassed">—</div>
      </div>
      <div class="summary-cell failed">
        <div class="label">Failed</div>
        <div class="value" id="summaryFailed">—</div>
      </div>
    </div>
    <div class="summary-duration" id="summaryDuration"></div>
  </div>

  <!-- Search bar -->
  <div class="search-section">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍 Search tests…" autocomplete="off">
    <button class="search-clear" id="searchClear" title="Clear search">✕</button>
  </div>

  <!-- List toolbar -->
  <div class="list-toolbar" id="listToolbar">
    <span class="list-toolbar-label" id="listCount"></span>
    <div class="list-toolbar-actions">
      <button class="toolbar-icon-btn" id="btnFailuresOnly" title="Show failures only" data-active="false">✗</button>
      <button class="toolbar-icon-btn" id="btnCollapseAll" title="Collapse all">⊟</button>
      <button class="toolbar-icon-btn" id="btnExpandAll" title="Expand all">⊞</button>
      <button class="toolbar-icon-btn" id="btnFolderView" title="Toggle folder view" data-active="false">⊿</button>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state-panel hidden" id="emptyState">
    <div class="empty-state-icon">◎</div>
    <div class="empty-state-title">No tests discovered yet</div>
    <div class="empty-state-body">Click <strong>Start Testing</strong> to discover and run your test suite.</div>
  </div>

  <!-- Test list -->
  <div class="test-list" id="testList"></div>

</div>

<script nonce="{{nonce}}" src="{{utilsUri}}"></script>
<script nonce="{{nonce}}" src="{{testListLayoutUri}}"></script>
<script nonce="{{nonce}}">
  const vscode = acquireVsCodeApi();
  const list = new TestListLayout(document.getElementById('testList'), vscode);

  // ── Elements ─────────────────────────────────────────────────────────────────
  const summaryTotal    = document.getElementById('summaryTotal');
  const summaryPassed   = document.getElementById('summaryPassed');
  const summaryFailed   = document.getElementById('summaryFailed');
  const summaryDuration = document.getElementById('summaryDuration');
  const runProgress     = document.getElementById('runProgress');
  const btnStart        = document.getElementById('btnStart');
  const btnRerun        = document.getElementById('btnRerun');
  const btnStop         = document.getElementById('btnStop');
  const btnStopRun      = document.getElementById('btnStopRun');
  const watchIndicator  = document.getElementById('watchIndicator');
  const listCount       = document.getElementById('listCount');
  const btnCollapseAll  = document.getElementById('btnCollapseAll');
  const btnExpandAll    = document.getElementById('btnExpandAll');
  const btnFailuresOnly = document.getElementById('btnFailuresOnly');
  const btnFolderView   = document.getElementById('btnFolderView');
  const emptyState      = document.getElementById('emptyState');
  const listToolbar     = document.getElementById('listToolbar');

  let totalFiles = 0;
  let completedFiles = 0;
  let failedDuringRun = 0;
  let runStartTime = 0;
  // 'idle' | 'running' | 'watching'
  let sessionState = 'idle';
  let showFailuresOnly = false;
  let showFolderView = false;

  // ── Session state → button visibility ────────────────────────────────────────
  function applySessionState(state) {
    sessionState = state;
    btnStart.classList.toggle('hidden', state !== 'idle');
    btnRerun.classList.toggle('hidden', state !== 'watching');
    btnStop.classList.toggle('hidden', state !== 'watching');
    btnStopRun.classList.toggle('hidden', state !== 'running');
    watchIndicator.classList.toggle('hidden', state !== 'watching');
    // Restore start button in case it was put into a loading state
    if (state === 'idle') {
      btnStart.disabled = false;
      btnStart.textContent = '▶ Start Testing';
    }
    updateListCount();
  }

  // ── Summary ───────────────────────────────────────────────────────────────────
  function updateSummary(total, passed, failed, durationMs) {
    summaryTotal.textContent  = total  != null ? total  : '—';
    summaryPassed.textContent = passed != null ? passed : '—';
    summaryFailed.textContent = failed != null ? failed : '—';
    if (durationMs != null) {
      summaryDuration.textContent = `Completed in ${durationLabel(durationMs)}`;
      summaryDuration.style.display = '';
    } else {
      summaryDuration.style.display = 'none';
    }
  }

  function updateListCount() {
    const total = list.data.length;
    const isEmpty = total === 0 && sessionState === 'idle';
    emptyState.classList.toggle('hidden', !isEmpty);
    listToolbar.classList.toggle('hidden', isEmpty);
    listCount.textContent = total > 0 ? `${total} file${total !== 1 ? 's' : ''}` : '';
  }

  // ── Search ────────────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value;
    searchClear.classList.toggle('visible', q.length > 0);
    list.setQuery(q);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    list.setQuery('');
  });

  // ── Action buttons ────────────────────────────────────────────────────────────
  btnStart.addEventListener('click', () => {
    btnStart.disabled = true;
    btnStart.textContent = '⟳ Starting…';
    vscode.postMessage({ type: 'cmd', command: 'start' });
  });
  btnRerun.addEventListener('click', () => vscode.postMessage({ type: 'cmd', command: 'start' }));
  btnStop.addEventListener('click', () => vscode.postMessage({ type: 'cmd', command: 'stop' }));
  btnStopRun.addEventListener('click', () => vscode.postMessage({ type: 'cmd', command: 'stop' }));

  // ── List toolbar buttons ──────────────────────────────────────────────────────
  btnCollapseAll.addEventListener('click', () => list.collapseAll());
  btnExpandAll.addEventListener('click', () => list.expandAll());

  btnFailuresOnly.addEventListener('click', () => {
    showFailuresOnly = !showFailuresOnly;
    btnFailuresOnly.dataset.active = String(showFailuresOnly);
    btnFailuresOnly.title = showFailuresOnly ? 'Show all tests' : 'Show failures only';
    list.setFailuresOnly(showFailuresOnly);
  });

  btnFolderView.addEventListener('click', () => {
    showFolderView = !showFolderView;
    btnFolderView.dataset.active = String(showFolderView);
    btnFolderView.title = showFolderView ? 'Switch to flat list' : 'Toggle folder view';
    list.setFolderView(showFolderView);
  });

  // ── Messages from extension ───────────────────────────────────────────────────
  window.addEventListener('message', (event) => {
    const msg = event.data;
    switch (msg.type) {

      case 'init':
        LiveTestUtils.setThresholds(msg.thresholds);
        list.setData(msg.files ?? []);
        updateSummary(msg.total, msg.passed, msg.failed, null);
        updateListCount();
        if (msg.sessionActive) applySessionState('watching');
        break;

      case 'session-started':
        applySessionState('watching');
        break;

      case 'session-stopped':
        applySessionState('idle');
        break;

      case 'run-started':
        totalFiles = msg.fileCount ?? 0;
        completedFiles = 0;
        failedDuringRun = 0;
        runStartTime = Date.now();
        runProgress.textContent = `Running — 0 / ${totalFiles} files`;
        runProgress.classList.add('visible');
        applySessionState('running');
        updateSummary(null, null, null, null);
        if (msg.files) { list.setData(msg.files); updateListCount(); }
        break;

      case 'run-finished':
        runProgress.classList.remove('visible');
        applySessionState(msg.sessionActive !== false ? 'watching' : 'idle');
        updateSummary(msg.total, msg.passed, msg.failed, Date.now() - runStartTime);
        if (msg.failed > 0) list.scrollToFirstFailure();
        break;

      case 'files-rerunning':
        for (const fileId of (msg.fileIds ?? [])) {
          list.markFileRunning(fileId, msg.suiteId, msg.testId);
        }
        break;

      case 'file-started':
        list.updateFile({
          fileId: msg.fileId,
          filePath: msg.filePath,
          name: msg.name,
          status: 'running',
          suites: [],
        });
        updateListCount();
        break;

      case 'file-result':
        completedFiles++;
        const elapsed = ((Date.now() - runStartTime)).toFixed(1);
        const failedStr = failedDuringRun > 0 ? ` • ${failedDuringRun} failed` : '';
        runProgress.textContent = `Running — ${completedFiles} / ${totalFiles} files • ${durationLabel(elapsed)}${failedStr}`;
        list.updateFile({ ...list.data.find(f => f.fileId === msg.fileId), status: msg.status, duration: msg.duration });
        break;

      case 'full-file-result':
        completedFiles++;
        if (msg.file.status === 'failed') failedDuringRun++;
        const el2 = ((Date.now() - runStartTime)).toFixed(1);
        const fl2 = failedDuringRun > 0 ? ` • <span class="progress-failed">${failedDuringRun} failed</span>` : '';
        runProgress.innerHTML = `Running — ${completedFiles} / ${totalFiles} files • ${durationLabel(el2)}${fl2}`;
        list.updateFile(msg.file);
        updateSummary(msg.total, msg.passed, msg.failed);
        break;

      case 'scope-changed':
        list.setSelected(msg.fileId, msg.suiteId, msg.testId);
        break;

      case 'coverage-update':
        document.getElementById('coverageFill').style.width = `${msg.percent}%`;
        break;
    }
  });

  // Signal readiness
  vscode.postMessage({ type: 'ready' });
</script>
</body>
</html>
