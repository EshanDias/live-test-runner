<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{stylesUri}}">
  <title>Live Test Runner</title>
</head>
<body>
<div id="app"></div>

<script nonce="{{nonce}}" src="{{utilsUri}}"></script>
<script nonce="{{nonce}}" src="{{testListLayoutUri}}"></script>
<script nonce="{{nonce}}" src="{{logPanelUri}}"></script>
<script nonce="{{nonce}}" src="{{errorPanelUri}}"></script>
<script nonce="{{nonce}}" src="{{testListViewUri}}"></script>
<script nonce="{{nonce}}" src="{{timelineSidebarUri}}"></script>
<script nonce="{{nonce}}" src="{{routerUri}}"></script>
<script nonce="{{nonce}}">
  const vscode = acquireVsCodeApi();
  Router.init({
    vscode:      vscode,
    views:       { testList: TestListView, timelineSidebar: TimelineSidebar },
    defaultView: 'testList',
  });
  vscode.postMessage({ type: 'ready' });
</script>
</body>
</html>
