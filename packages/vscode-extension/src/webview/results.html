<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{stylesUri}}">
  <title>Test Results</title>
  <style>
    body { overflow: hidden; }
    #app { display: flex; height: 100vh; width: 100%; }
    .resize-handle { width: 4px; cursor: col-resize; background: transparent; flex-shrink: 0; }
    .resize-handle:hover { background: var(--vscode-focusBorder); }
  </style>
</head>
<body>
<div id="app"></div>

<script nonce="{{nonce}}" src="{{utilsUri}}"></script>
<script nonce="{{nonce}}" src="{{testListLayoutUri}}"></script>
<script nonce="{{nonce}}" src="{{resultsViewUri}}"></script>
<script nonce="{{nonce}}" src="{{timelineViewUri}}"></script>
<script nonce="{{nonce}}" src="{{routerUri}}"></script>
<script nonce="{{nonce}}">
  const vscode = acquireVsCodeApi();
  Router.init({
    vscode:      vscode,
    views:       { results: ResultsView, timeline: TimelineView },
    defaultView: 'results',
  });
  vscode.postMessage({ type: 'ready' });
</script>
</body>
</html>
