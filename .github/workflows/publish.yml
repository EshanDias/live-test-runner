name: Publish VSCode Extension

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node with pnpm cache
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      - name: Build
        run: pnpm run build
        # remove if you don’t have build step

      - name: Install vsce
        run: npm install -g vsce

      - name: Publish
        run: vsce publish -p $VSCE_PAT --no-dependencies --baseContentUrl https://raw.githubusercontent.com/EshanDias/live-test-runner/main/packages/vscode-extension
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npx ovsx publish -p $OVSX_PAT \
          --no-dependencies \
          --baseContentUrl https://raw.githubusercontent.com/EshanDias/live-test-runner/main/packages/vscode-extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
